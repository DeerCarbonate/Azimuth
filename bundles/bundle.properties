# < Planets >
planet.azimut-alveon.name = Etamine
planet.azimut-gelion.name = Gelion
planet.azimut-merid.name = Merid
planet.azimut-lurcia.name = Lurcia
planet.azimut-tyl.name = Tyl
# < Items >
item.azimut-cobalt.name = Cobalt
item.azimut-cobalt.description = Used in basic construction.
item.azimut-venerium.name = Venerium
item.azimut-venerium.description = Used in defensive structures and as ammunition.
item.azimut-venerium.details = Solid. Crystalline in form.\n Surprisingly, this material makes up nearly half of the planet’s entire surface.
item.azimut-raw-platinum.name = Raw platinum
item.azimut-raw-platinum.description = Needs heat treatment. Can be used as weak ammunition.
item.azimut-platinum.name = Platinum
item.azimut-platinum.description = Used in electrochemical reactions. A good conductor of heat.
item.azimut-geliarin.name = Geliarin
item.azimut-geliarin.description = Used in advanced constructions. A core component for creating units.
item.azimut-compound.name = Compound
item.azimut-compound.description = Used as a durable bonding material. A core component for creating advanced units.
item.azimut-compound.details = Carbon-based life forms have always been usable in biotechnology. What about silicon-based ones?
item.azimut-solid-fuel.name = Solid fuel
item.azimut-solid-fuel.description = Used for power production.
item.azimut-sphalerite.name = Sphalerite
item.azimut-sphalerite.description = Needs heat treatment.
item.azimut-titanite.name = Titanite
item.azimut-titanite.description = Used as an insulator and in heavier structures.
item.azimut-zinc.name = Zinc
item.azimut-zinc.description = Used in advanced electronics, battery production, and as ammunition.
item.azimut-raw-caterium.name = Raw caterium
item.azimut-raw-caterium.description = Needs heat treatment. Can be used as charged ammunition.
item.azimut-caterium.name = Caterium
item.azimut-caterium.description = Widely used in construction devices and next-generation units. Conducts heat and electricity well.
item.azimut-caterium.details = A gold-like material. It likely arrived here from another world.
item.azimut-information-cell.name = Information cell
item.azimut-information-cell.description = Needs decoding.
item.azimut-byte.name = Byte
item.azimut-byte.description = A special resource for research. Spend it wisely.
# < Liquids >
liquid.azimut-isobutane.name = Isobutane
liquid.azimut-isobutane.description = Used as a light fuel. Highly flammable.
liquid.azimut-ammonia.name = Ammonia
liquid.azimut-ammonia.description = Used in the production of advanced resources. Capable of suppressing fires.
liquid.azimut-power.name = Power
liquid.azimut-power.description = Used to generate heat, speed up drills, and serve as an accelerator for turrets.
liquid.azimut-iterin.name = Iterin
liquid.azimut-iterin.description = Used as fuel for aircraft and as a component in the production of solid fuel. Highly flammable.
liquid.azimut-swartzite.name = Swartzite
liquid.azimut-swartzite.description = Used as a liquid inert medium.
liquid.azimut-cesium.name = Cesium
liquid.azimut-cesium.description = Used in devices and factories that require precise operation, as well as in the laser industry. Moderately explosive and flammable.
# < Units >
# < Hover >
unit.azimut-Improvement.name = Feather
unit.azimut-Improvement.description = Fires a salvo of five homing projectiles. Can hover over liquids.
unit.azimut-Innovation.name = Flow
unit.azimut-Innovation.description = Fires a barrage of homing bullets. Can hover over liquids. Leaves a decaying husk that continues fighting.
unit.azimut-Promotion.name = Sigil
unit.azimut-Promotion.description = Fires a pulsed energy orb at enemy targets. Destroys incoming enemy projectiles using energy point defense. Can hover over liquids.
unit.azimut-Development.name = Banner
unit.azimut-Perfection.name = Rampart
# < Naval >
unit.azimut-Plankton.name = Drift
unit.azimut-Plankton.description = Sequentially fires a burst of two long-range bullets. Creates a small localized explosion upon destruction.
unit.azimut-Octopus.name = Compass
unit.azimut-Octopus.description = Fires long-range artillery at ground targets. Can apply the “Tow” effect to allied units.
unit.azimut-Whale.name = Ferry
unit.azimut-Whale.description = Fires long-range missiles that stun everything within their energy field. The missiles repair allies.
unit.azimut-Cthulhu.name = Retention
unit.azimut-Neptune.name = Breach
# < Mech >
unit.azimut-Legate.name = Argoy
unit.azimut-Legate.description = Fires standard bullets at ground targets.
unit.azimut-Marshal.name = Teliff
unit.azimut-Marshal.description = Fires a three-round burst sequentially. While firing, it gains the “Ram” effect, which increases its rate of fire but reduces its movement speed. Can provide a shield to allied units.
unit.azimut-Paladin.name = Arbiter
unit.azimut-Paladin.description = Fires a volley of lasers. Can provide a shield to allied units. Can step over most terrain.
unit.azimut-Paladin.details = Rumor has it that the thunder of its laser emitters was so fierce that even the devils in hell began to curse.
unit.azimut-Archon.name = Pilgrim
unit.azimut-Emperor.name = Tyris
# < Core >
unit.azimut-adder.name = Adder
unit.azimut-adder.description = Defends the "Forum" core from enemies. The primary construction unit. Repairs allied structures using fractional homing projectiles.
unit.azimut-akarius.name = Akarius
unit.azimut-akarius.description = Defends the "Network" core from enemies. The primary construction unit. Repairs allied structures using a beam. Summons two satellites that orbit the unit and repair allied structures.
unit.azimut-toroid.name = Toroid
unit.azimut-toroid.description = Automatically repairs structures and assists other units in construction. Stuns enemy blocks and heals allies using its energy field.
# < Special >
unit.azimut-heal-drone.name = Heal drone
unit.azimut-orbital-regeneration-drone.name = Orbital regeneration drone
unit.azimut-force-drone.name = Force drone
unit.azimut-fortification-drone.name = Fortification drone
# < Blocks >
# < Special >
block.azimut-heal-drone-station.name = Repairing station
block.azimut-heal-drone-station.description = Produces repair drones. The drones automatically repair nearby structures with a powerful beam. If a repair drone already exists, the block stops consuming resources.
block.azimut-orbital-regeneration-drone-station.name = Orbital regeneration station
block.azimut-orbital-regeneration-drone-station.description = Produces orbital regeneration drones. The drones create an accretion disk of projectiles. The accretion disk has storage capacity and can regenerate blocks. If a regeneration drone already exists, the block stops consuming resources.
block.azimut-force-drone-station.name = Force station
block.azimut-force-drone-station.description = Produces force drones. The drones have a segmented force field that protects buildings and units inside from damage.\n They reflect enemy projectiles and overheat if subjected to a large amount of damage. If a force drone already exists, the block stops consuming resources.
block.azimut-fortification-drone-station.name = Fortification station
block.azimut-fortification-drone-station.description = Produces fortification drones. The drones can apply the “Fortified” effect to allied units. If a fortification drone already exists, the block stops consuming resources.
# < Units >
block.azimut-component-conveyor.name = Component conveyor 
block.azimut-component-conveyor.description = Transports components forward.
block.azimut-mech-editor.name = Mech editor
block.azimut-mech-editor.description = Produces ground mech units. Units can be output directly or redirected to adjuster assemblers for upgrades.
block.azimut-naval-editor.name = Naval editor
block.azimut-naval-editor.description = Produces naval units. Units can be output directly or redirected to adjuster assemblers for upgrades.
block.azimut-hover-editor.name = Hover editor
block.azimut-hover-editor.description = Produces hover units. Units can be output directly or redirected to adjuster assemblers for upgrades.
block.azimut-mech-adjuster.name = Mech adjuster assembler
block.azimut-mech-adjuster.description = Assembles larger mechs from supplied blocks and units. The tier of assembled units can be increased by adding modules.
block.azimut-naval-adjuster.name = Naval adjuster assembler
block.azimut-naval-adjuster.description = Assembles larger ships from supplied blocks and units. The tier of assembled units can be increased by adding modules.
block.azimut-hover-adjuster.name = Hover adjuster assembler
block.azimut-hover-adjuster.description = Assembles larger hover and flying units from supplied blocks and units. The tier of assembled units can be increased by adding modules.
block.azimut-component-assembler.name = Component assembler
block.azimut-component-assembler.description = Produces 1x1 and 2x2 components.
block.azimut-toroid-builder.name = Unit gestator: Toroid
block.azimut-toroid-builder.description = Produces a "Toroid" unit when supplied with iterine. Explodes after creation, leaving fire behind.
# < Turrets >
block.azimut-yongsin.name = Yongsin
block.azimut-yongsin.description = Fires a volley of three high-explosive shells at ground targets.
block.azimut-priority.name = Priority
block.azimut-priority.description = Fires an intermittent stream of flame at enemy targets. Requires heat. Actual damage is 120.
block.azimut-priority.details = Burn Azafur!
block.azimut-dezolo.name = Dezolo
block.azimut-dezolo.description = Fires high-velocity shrapnel at enemy targets.
block.azimut-relocator.name = Relocator
block.azimut-relocator.description = Fires rapid bursts of charged bullets at enemy targets.
block.azimut-spray.name = Spray
block.azimut-spray.description = Fires a stream of liquid at enemies with high spread. Automatically extinguishes fires when supplied with ammonia or swartzite.
block.azimut-jannabi.name = Jannabi
block.azimut-jannabi.description = Fires powerful shells at ground targets. Requires heat.
block.azimut-astraeus.name = Astraeus
block.azimut-astraeus.description = Fires alternating bullets at enemies.
block.azimut-retray.name = Kalidor
block.azimut-retray.description = Fires four charges containing autonomous drones. The drones attack enemies and destroy incoming projectiles.
block.azimut-gravastar.name = Gravastar
block.azimut-gravastar.description = Fires a volley of lasers. Requires iterin.
# < Walls >
block.azimut-venerium-wall.name = Venerium wall
block.azimut-venerium-wall.description = Protects structures from enemy projectiles.
block.azimut-venerium-large-wall.name = Large venerium wall
block.azimut-venerium-largw-wall.description = Protects structures from enemy projectiles.
block.azimut-venerium-huge-wall.name = Huge venerium wall
block.azimut-venerium-huge-wall.description = Protects structures from enemy projectiles.
block.azimut-compound-wall.name = Compound wall
block.azimut-compound-wall.description = Protects structures from enemy projectiles.
block.azimut-compound-large-wall.name = Large compound wall
block.azimut-compound-large-wall.description = Protects structures from enemy projectiles.
block.azimut-compound-huge-wall.name = Huge compound wall
block.azimut-compound-huge-wall.description = Protects structures from enemy projectiles.
block.azimut-geliarin-door.name = Geliarin door
block.azimut-geliarin-door.description = An automatically opening wall that opens only when allied ground units are nearby.
block.azimut-zinc-wall.name = Galvanized wall
block.azimut-zinc-wall.description = Protects structures from enemy projectiles and periodically releases an electric discharge when struck.
block.azimut-zinc-large-wall.name = Large galvanized wall
block.azimut-zinc-large-wall.description = Protects structures from enemy projectiles and periodically releases an electric discharge when struck.
block.azimut-zinc-huge-wall.name = Huge galvanized wall
block.azimut-zinc-huge-wall.description = Protects structures from enemy projectiles and periodically releases an electric discharge when struck.
# < Storage >
block.azimut-core-forum.name = Core: "Forum"
block.azimut-core-forum.description = The core of the base. Armored. If destroyed, all contact with the sector is lost.
block.azimut-core-forum.details = The first iteration. Armored and self-replicating. Equipped with logic technologies. Fitted with disposable solid-fuel RCS systems and landing thrusters. Well suited for planetary travel.
block.azimut-core-network.name = Core: "Network"
block.azimut-core-network.description = The core of the base. Well armored. Stores more resources than the Forum core.
block.azimut-galvanized-container.name = Galvanized container
block.azimut-galvanized-container.description = Stores a small amount of each item type. Items can be extracted using an unloader.
block.azimut-illuminator.name = Illuminator
block.azimut-illuminator.description = Emits light.
# < Crafting >
block.azimut-decoder.name = Decoder
block.azimut-decoder.description = Deciphers information from information cells, synthesizing a special research resource — bytes.
block.azimut-decoder.details = Draedon would not be pleased.
block.azimut-platinum-smelter.name = Platinum smelter
block.azimut-platinum-smelter.description = Smelts platinum using butane and raw platinum.
block.azimut-platinum-forge.name = Platinum forge
block.azimut-platinum-forge.description = Synthesizes platinum using raw platinum and isobutane, employing cesium as an additional source of heat and for enhancing the precision of the smelting lasers.
block.azimut-isobutane-burner.name = Isobutane burner
block.azimut-isobutane-burner.description = Generates power by burning isobutane.
block.azimut-mixing-chamber-base.name = Mixing chamber base
block.azimut-mixing-chamber-base.description = Synthesizes gelarin from cobalt and gaseous ammonia.
block.azimut-mixing-chamber-part.name = Mixing chamber part
block.azimut-mixing-chamber-part.description = Vaporizes liquid ammonia into gaseous ammonia. Requires heat.
block.azimut-power-heater.name = Power heater
block.azimut-power-heater.description = Heats blocks ahead. Requires power.
block.azimut-heat-courier.name = Heat Redirector
block.azimut-heat-courier.description = Redirects accumulated heat to other blocks.
block.azimut-silicon-cultivator.name = Silicon Cultivator
block.azimut-silicon-cultivator.description = Uses ammonia, power, and silicon-infested tiles to cultivate compound.
block.azimut-solid-fuel-mixer.name = Solid Fuel Mixer
block.azimut-solid-fuel-mixer.description = Synthesizes solid fuel by mixing isobutane and iterin.
block.azimut-exothermic-chamber.name = Exothermic chamber
block.azimut-exothermic-chamber.description = Generates power by burning solid fuel.
block.azimut-titanite-matrix.name = Titanite Matrix
block.azimut-titanite-matrix.description = Converts platinum and sphalerite into titanite. Releases isobutane as a byproduct.
block.azimut-sphalerite-refiner.name = Sphalerite Refiner
block.azimut-sphalerite-refiner.description = Produces zinc from sphalerite. Requires heat.
block.azimut-static-refiner.name = Static Refiner
block.azimut-static-refiner.description = Extracts caterium from raw caterium. Requires ammonia as a stabilizer. Produces nitrogen and cesium as byproducts.
block.azimut-static-refiner.details = Nitric acid was not part of the deal!
block.azimut-atmospheric-extractor-base.name = Atmospheric extractor base
block.azimut-atmospheric-extractor-base.description = Concentrates isobutane from the atmosphere.
block.azimut-atmospheric-extractor-cooler.name = Atmospheric extractor condenser
block.azimut-atmospheric-extractor-cooler.description = Condenses swartzite using venerium. Requires heat to operate.
block.azimut-atmospheric-extractor-collector.name = Atmospheric extractor separator
block.azimut-atmospheric-extractor-collector.description = Extracts trace gases from the local atmosphere and concentrates them into ammonia.
# < Drills >
block.azimut-mechanical-quarry.name = Mechanical quarry
block.azimut-mechanical-quarry.description = When placed on a suitable ore, continuously outputs items at a slow rate. Can extract only basic resources.
block.azimut-cold-conversion-solar-panel.name = Cold conversion solar panel
block.azimut-cold-conversion-solar-panel.description = Synthesizes iterin by condensing atmospheric gases and processing them with ultraviolet radiation.
block.azimut-relic-drill.name = Relic drill
block.azimut-relic-drill.description = When placed on the appropriate ore, continuously outputs items in bursts. Requires power.
block.azimut-terraformer.name = Terraformer
block.azimut-terraformer.description = When placed facing an ore-bearing wall, continuously outputs items. Requires power.
# < Power >
block.azimut-energy-bridge.name = Energy bridge
block.azimut-energy-bridge.description = Transfers power to connected bridges. A bridge will either receive power or supply power to any adjacent blocks.
block.azimut-energy-converter.name = Power converter
block.azimut-energy-converter.description = Converts liquid power into standard power.
block.azimut-diphasic-solar-array.name = Diphasic solar array
block.azimut-diphasic-solar-array.description = Provides a small amount of energy from the sun. Its inconsistent power output will force you to use galvanized power banks.
block.azimut-zinc-polyetheric-reactor.name = Zinc polyetheric reactor
block.azimut-zinc-polyetheric-reactor.description = Generates power by burning solid fuel and stabilizing it through timely nitrogen cooling. Produces heat.
block.azimut-galvanized-power-bank.name = Galvanized power bank
block.azimut-galvanized-power-bank.description = Stores excess power during times of surplus. Releases power during shortages.
# < Conveyors >
block.azimut-cobalt-duct.name = Cobalt duct
block.azimut-cobalt-duct.description = Moves items forward.
block.azimut-geliarin-duct.name = Geliarin duct
block.azimut-geliarin-duct.description = Moves items forward in batches. Accepts items at the starting segment and unloads them from the final segment to three directions.
block.azimut-geliarin-router.name = Geliarin router
block.azimut-geliarin-router.description = Evenly distributes items from geliarin ducts to three directions.
block.azimut-platinum-duct.name = Platinum duct
block.azimut-platinum-duct.description = Moves items forward. Does not accept input from the sides.
block.azimut-cobalt-junction.name = Cobalt junction
block.azimut-cobalt-junction.description = Acts as a bridge for two intersecting cobalt channels.
block.azimut-cobalt-duct-bridge.name = Cobalt bridge
block.azimut-cobalt-duct-bridge.description = Transports items over terrain and buildings.
block.azimut-cobalt-router.name = Cobalt router
block.azimut-cobalt-router.description = Evenly distributes incoming items to three output directions.
block.azimut-cobalt-sorter.name = Cobalt sorter
block.azimut-cobalt-sorter.description = If the incoming item matches the selection, it passes forward. Otherwise, the item is output to the left and right.
block.azimut-cobalt-overflow-gate.name = Cobalt overflow gate
block.azimut-cobalt-overflow-gate.description = Outputs items to the sides only when the forward path is blocked.
block.azimut-inverted-cobalt-overflow-gate.name = Cobalt underflow gate
block.azimut-inverted-cobalt-overflow-gate.description = Opposite of the cobalt overflow gate. Outputs items forward only when the side outputs are blocked.
block.azimut-cobalt-unloader.name = Galvanized unloader
block.azimut-cobalt-unloader.description = Unloads the selected item from the block behind it. Cannot unload from cores.
block.azimut-cargo-loader-load.name = Reinforced unit cargo loader
block.azimut-cargo-loader-load.description = Produces reinforced cargo drones. Drones automatically distribute items to unloading points based on the filter set on them.
block.azimut-cargo-unloader-unload.name = Unit cargo unload point
block.azimut-cargo-unloader-unload.description = Acts as an unloading point for cargo drones. Accepts items matching the selected filter.
block.azimut-polyetheric-conveyor.name = Polyetheric conveyor
block.azimut-polyetheric-conveyor.description = Instantly transports items over terrain or buildings. Has an absurdly long transfer range. Requires a huge amount of power.
# < Liquids >
block.azimut-pump.name = Cobalt pump
block.azimut-pump.description = Pumps and outputs liquids. Does not require power.
block.azimut-galvanized-pump.name = Galvanized pump
block.azimut-galvanized-pump.description = Pumps and outputs liquids. Requires power.
block.azimut-galvanized-pipeline.name = Galvanized pipeline
block.azimut-galvanized-pipeline.description = Transports liquids over any terrain or buildings. Requires a small amount of power.
block.azimut-directed-conduit.name = Directed conduit
block.azimut-directed-conduit.description = Moves liquids forward. Used in conjunction with pumps and other pipelines.
block.azimut-directed-liquid-junction.name = Directed liquid junction
block.azimut-directed-liquid-junction.description = Acts as a bridge for two intersecting pipelines.
block.azimut-directed-liquid-bridge.name = Directed liquid bridge
block.azimut-directed-liquid-bridge.description = Transports liquids over any terrain or buildings.
block.azimut-directed-liquid-router.name = Directed liquid router
block.azimut-directed-liquid-router.description = Evenly distributes liquids in all directions.
block.azimut-small-liquid-cylinder.name = Small Liquid Cylinder
block.azimut-small-liquid-cylinder.description = Stores a small amount of liquid.
block.azimut-large-liquid-tank.name = Large Liquid Tank
block.azimut-large-liquid-tank.description = Stores a large amount of liquid.
# < Logic >
block.azimut-alloy-memory-cell.name = Alloy memory cell
block.azimut-alloy-memory-cell.description = Stores data for the galvanized processor.
block.azimut-zinc-processor.name = Galvanized processor
block.azimut-zinc-processor.description = Executes a sequence of logical instructions in a loop. Can be used to control units and blocks.
# < Status >
status.azimut-ram.name = Ram
status.azimut-emp.name = Emp
status.azimut-charge.name = Charge
status.azimut-tow.name = Tow
status.azimut-fortified.name = Fortified
# < Sectors >
sector.azimut-first.name = Arrival
sector.azimut-first.description = Low enemy activity makes this sector ideal for researching early technologies.\n\nAutomate production and push forward.
sector.azimut-twos.name = Silicon Ravine
sector.azimut-twos.description = Along the mountainous terrain stretches a ravine filled with an unknown life form. An enemy base blocks further advancement.\n\nUse ammonia condensed on the surface of the ice. Creating a new resource will help you destroy the enemy base.
sector.azimut-threes.name = Cold Harbor
sector.azimut-threes.description = The flooded harbor severely limits your choice of combat units. To destroy the two enemy cores, you will have to rely on ships.\n\nUse the long-range capabilities of ships to gain the upper hand in the siege of the enemy base.
sector.azimut-four.name = Wilderness
sector.azimut-four.description = This sector’s ruins contain technologies that will support your future expansion.\n\nExpect heavy enemy resistance as they attempt to safeguard this information.
sector.azimut-fifth.name = Tight Caverns
sector.azimut-fifth.description = Within vast mountain ranges, sun-exposed fissures are often found.\n\nUse technological superiority to destroy the enemy base and advance forward.
sector.azimut-sixth.name = Melting Channels
sector.azimut-sixth.description = Where ancient glaciers once stood, a vast network of flooded channels now stretches across the region.\n\nDue to the rugged terrain, you will need to rely on hovers — agile combat units capable of traversing most obstacles.
sector.azimut-seven.name = Frozen Frontier
sector.azimut-seven.description = A chain of archipelagos spreads along the flooded channels.\n\nThe enemy stronghold maintains control of the airspace, cutting off the route to the north. A successful assault will require deploying two different types of combat units. Stay alert — the enemy will put up heavy resistance.
sector.azimut-seven.details = The Seekers of Inferno have always been known for their technological progress. After signing a research agreement with the Aggressors, their air defense systems were improved so much that the passage to the north is now blocked by a massive firing zone. In addition, parts of the equator and the southern regions are also under strict airspace control.
sector.azimut-eight.name = Northern Pass
sector.azimut-eight.description = Set out for the coldest, snow-covered regions of the planet to extract a new type of resource.\n\nThe harsh climate and confined terrain will create resource scarcity — use what you have wisely.
sector.azimut-nine.name = Cold Spot
sector.azimut-nine.description = In the cold haze, an enemy base exists.\n\nStudy the new gold-like material and create the Arbiter, a heavy ground unit, to capture the enemy base.
sector.azimut-nine.details = Mining two materials with similar electrochemical properties may seem inefficient. However, in this case it is a necessary step to advance further.
sector.azimut-ten.name = Estuary
sector.azimut-ten.description = Further along the equator, there is a recently formed estuary.\n\nNo enemy activity has been detected in the sector. Turn the sector into a resource outpost and advance further.
sector.azimut-elev.name = Thicket
sector.azimut-elev.description = In this temperate climate, vegetation is becoming increasingly widespread. The name of this place is no coincidence—it comes from the rapid and abundant growth of flora here.\n\nBegin investing in the decoder. Establish your defenses. Make use of the unique resource for research.
sector.azimut-elev.details = Unlike spores, silicon-based lifeforms are relatively non-aggressive and highly useful for industrial purposes. Two of the most advanced types stand out immediately. Here, they coexist in harmony, showing no signs of competing for survival or dominance—an unusual and fascinating behavior.
sector.azimut-twelw.name = Arched lakes
sector.azimut-twelw.description = The thicket borders a pair of stagnant lakes that are periodically replenished by local rains. The arches that loosely divide the lakes appear to be supported by cobalt rods.\n\nDestroying the enemy base will firmly secure our position in this region. Use “Ferrymen” - long-range naval units that will put heavy pressure on the enemy base’s logistics.