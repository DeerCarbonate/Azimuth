# < Planets >
planet.azimut-alveon.name = Этамин
planet.azimut-gelion.name = Гелион
planet.azimut-merid.name = Мерид
planet.azimut-lurcia.name = Лурсия
# < Items >
item.azimut-cobalt.name = Кобальт
item.azimut-cobalt.description = Используется в базовых строениях.
item.azimut-venerium.name = Венериум
item.azimut-venerium.description = Используется в защитных сооружениях и как боеприпас.
item.azimut-raw-platinum.name = Сырая платина
item.azimut-raw-platinum.description = Нуждается в термальной обработке. Может использоваться как слабый боеприпас.
item.azimut-venerium.details = Твёрдый. С кристаллической формой.\n На удивление, этот материал составляет почти половину поверхности всей планеты.
item.azimut-platinum.name = Платина
item.azimut-platinum.description = Используется в электрохимических реакциях. Хороший проводник тепла.
item.azimut-geliarin.name = Геларин
item.azimut-geliarin.description = Используется в продвинутых конструкциях. Основной компонент для создания юнитов.
item.azimut-compound.name = Соединение
item.azimut-compound.description = Используется как прочный соединительный материал. Основной компонент для создания продвинутых юнитов.
item.azimut-compound.details = Углеродные формы жизни всегда можно было использовать в биотехнологиях. Что насчёт кремниевых?
item.azimut-solid-fuel.name = Твёрдое топливо
item.azimut-solid-fuel.description = Используется для производства энергии.
item.azimut-sphalerite.name = Сфалерит
item.azimut-sphalerite.description = Нуждается в термальной обработке.
item.azimut-zinc.name = Цинк
item.azimut-zinc.description = Используется в продвинутой электронике, для создания аккумуляторов и как боеприпас.
item.azimut-raw-caterium.name = Сырой катериум
item.azimut-raw-caterium.description = Нуждается в термической обработке. Может использоваться в качестве заряженного боеприпаса.
item.azimut-caterium.name = Катериум
item.azimut-caterium.description = Широко используется в строительных устройствах и юнитах нового поколения. Хорошо проводит электричество и тепло.
item.azimut-caterium.details = Золотоподобный материал. Вероятно, он прибыл сюда из другого мира.
item.azimut-information-cell.name = Информационная ячейка
item.azimut-information-cell.description = Нуждается в расшифровке.
item.azimut-byte.name = Байт
item.azimut-byte.description = Особый ресурс для исследований. Тратьте его с умом.
# < Liquids >
liquid.azimut-isobutane.name = Изобутан
liquid.azimut-isobutane.description = Используется в качестве лёгкого топлива. Легковоспламеняющийся.
liquid.azimut-ammonia.name = Аммиак
liquid.azimut-ammonia.description = Используется для производства продвинутых ресурсов. Способен тушить огонь.
liquid.azimut-power.name = Энергия
liquid.azimut-power.description = Используется для создания тепла, ускорения буров и в качестве ускорителя для турелей.
liquid.azimut-iterin.name = Итерин
liquid.azimut-iterin.description = Используется в качестве топлива для летательных аппаратов и как компонент для получения твёрдого топлива. Легковоспламеняющийся.
liquid.azimut-swartzite.name = Свартзит
liquid.azimut-swartzite.description = Используется в качестве жидкостной инертной среды.
liquid.azimut-cesium.name = Цезий
liquid.azimut-cesium.description = Используется в приборах и заводах, требующих высокой точности, а также в лазерной промышленности. Умеренно взрывоопасный и легковоспламеняющийся.
# < Units >
# < Hover >
unit.azimut-Improvement.name = Перо
unit.azimut-Improvement.description = Выпускает залп из пяти самонаводящихся снарядов. Может парить над жидкостями.
unit.azimut-Innovation.name = Поток
unit.azimut-Innovation.description = Выпускает шквал самонаводящихся пуль. Может парить над жидкостями. Оставляет разрушающийся остов, который продолжает сражаться.
unit.azimut-Promotion.name = Сигил
unit.azimut-Promotion.description = Стреляет импульсным энергетическим шаром по вражеским целям. Поражает вражеские снаряды с помощью энергетической точечной защиты. Может парить над жидкостями.
unit.azimut-Development.name = Знамя
unit.azimut-Perfection.name = Оплот
# < Naval >
unit.azimut-Plankton.name = Дрейф
unit.azimut-Plankton.description = Последовательно выпускает залп из двух дальнобойных снарядов. При уничтожении создаёт небольшой локальный взрыв.
unit.azimut-Octopus.name = Компас
unit.azimut-Octopus.description = Ведёт дальнобойный артиллерийский огонь по наземным целям. Может накладывать эффект «Буксир» на союзные юниты.
unit.azimut-Whale.name = Паромщик
unit.azimut-Whale.description = Стреляет дальнобойными ракетами, которые оглушают всё, что попадает в их энергетическое поле. Ракеты ремонтируют союзников.
unit.azimut-Cthulhu.name = Удержание
unit.azimut-Neptune.name = Прорыв
# < Mech >
unit.azimut-Legate.name = Аргой
unit.azimut-Legate.description = Стреляет стандартными пулями по наземным целям.
unit.azimut-Marshal.name = Телифф
unit.azimut-Marshal.description = Последовательно стреляет залпом из трёх выстрелов. Во время стрельбы получает эффект «Таран», увеличивающий скорострельность, но снижающий скорость передвижения. Может предоставлять щит союзным юнитам.
unit.azimut-Paladin.name = Арбитр
unit.azimut-Paladin.description = Выпускает залп лазеров. Способен выдавать щит союзным юнитам. Может перемещаться по большинству участков местности.
unit.azimut-Paladin.details = Говорят, гром его лазерных излучателей был настолько яростным, что даже черти в аду начинали шугаться.
unit.azimut-Archon.name = Пилигрим
unit.azimut-Emperor.name = Тирис
# < Core >
unit.azimut-adder.name = Сумматор
unit.azimut-adder.description = Защищает ядро «Форум» от врагов. Основная строительная единица.
unit.azimut-akarius.name = Акариус
unit.azimut-toroid.name = Тороид
unit.azimut-toroid.description = Автоматически восстанавливает постройки и помогает в строительстве другим единицам. Оглушает вражеские блоки и лечит союзные с помощью своего энергетического поля.
# < Special >
unit.azimut-heal-drone.name = Ремонтный дрон
unit.azimut-orbital-regeneration-drone.name = Орбитальный регенерационный дрон
unit.azimut-force-drone.name = Силовой дрон
unit.azimut-fortification-drone.name = Усиляющий дрон
# < Blocks >
# < Special >
block.azimut-heal-drone-station.name = Ремонтирующая станция
block.azimut-heal-drone-station.description = Производит ремонтных дронов. Дроны автоматически ремонтируют ближайшие постройки мощным лучом. Если ремонтирующий дрон уже существует, то блок перестаёт потреблять ресурсы.
block.azimut-orbital-regeneration-drone-station.name = Орбитальная регенерационная станция
block.azimut-orbital-regeneration-drone-station.description = Производит орбитальные регенерационные дроны. Дроны создают аккреционный диск из снарядов. Аккреционный диск обладает накопительной способностью и может восстанавливать блоки. Если регенерационный дрон уже существует, блок перестаёт потреблять ресурсы.
block.azimut-force-drone-station.name = Силовая станция
block.azimut-force-drone-station.description = Производит силовых дронов. Дроны имеют сегментированное силовое поле. Поле защищает постройки и юнитов внутри от получения урона.\n Поле отражает вражеские снаряды и перегревается, если нанесено слишком большое количество повреждений. Если силовой дрон уже существует, то блок перестаёт потреблять ресурсы.
block.azimut-fortification-drone-station.name = Укрепляющая станция
block.azimut-fortification-drone-station.description = Производит укрепляющих дронов. Дроны могут выдавать эффект "Укреплённый" на союзные юниты. Если укрепляющий дрон уже существует, то блок перестаёт потреблять ресурсы.
# < Units >
block.azimut-mech-editor.name = Редактор шагоходов
block.azimut-mech-editor.description = Производит наземные шагоходные единицы. Вывод единиц может быть осуществлён напрямую, либо перенаправлен в регулятивные сборщики для улучшения.
block.azimut-naval-editor.name = Редактор кораблей
block.azimut-naval-editor.description = Производит морские единицы. Вывод единиц может быть осуществлён напрямую, либо перенаправлен в регулятивные сборщики для улучшения.
block.azimut-hover-editor.name = Редактор ховеров
block.azimut-hover-editor.description = Производит ховерные единицы. Вывод единиц может быть осуществлён напрямую, либо перенаправлен в регулятивные сборщики для улучшения.
block.azimut-mech-adjuster.name = Регулятивный сборщик мехов
block.azimut-mech-adjuster.description = Собирает больших мехов из введённых блоков и единиц. Уровень собираемых единиц может быть увеличен путём добавления модулей.
block.azimut-naval-adjuster.name = Регулятивный сборщик кораблей
block.azimut-naval-adjuster.description = Собирает большие корабли из введённых блоков и единиц. Уровень собираемых единиц может быть увеличен путём добавления модулей.
block.azimut-hover-adjuster.name = Регулятивный сборщик ховеров
block.azimut-hover-adjuster.description = Собирает больших ховерных и воздушных единиц из введённых блоков и единиц. Уровень собираемых единиц может быть увеличен путём добавления модулей.
block.azimut-component-assembler.name = Сборщик компонентов
block.azimut-component-assembler.description = Производит компоненты размером 1x1 и 2x2.
block.azimut-toroid-builder.name = Гестатор юнита: Тороид
block.azimut-toroid-builder.description = Создаёт юнита "Тороид" при подаче итерина. После создания взрывается, оставляя огонь.
# < Turrets >
block.azimut-yongsin.name = Ёнван
block.azimut-yongsin.description = Стреляет залпом из трёх фугасных снарядов по наземным целям.
block.azimut-priority.name = Приоритет
block.azimut-priority.description = Стреляет прерываемой струёй пламени по вражеским целям. Требует тепло для работы. Настоящий урон - 120 единиц.
block.azimut-priority.details = Поджиг Азафура!
block.azimut-dezolo.name = Дезоло
block.azimut-dezolo.description = Стреляет высокоскоростной шрапнелью по вражеским целям.
block.azimut-relocator.name = Релокатор
block.azimut-relocator.description = Стреляет быстрыми залпами заряженных пуль по вражеским целям.
block.azimut-spray.name = Пшикалка
block.azimut-spray.description = Выпускает поток жидкости по врагам с большим разбросом. Автоматически тушит пожары при подаче аммиака и свартзита.
block.azimut-jannabi.name = Джаннаби
block.azimut-jannabi.description = Стреляет мощными снарядами по наземным целям. Требует тепло для работы.
block.azimut-astraeus.name = Астрей
block.azimut-astraeus.description = Стреляет по врагам чередующимися пулями.
block.azimut-retray.name = Калидор
block.azimut-retray.description = Стреляет четырьмя зарядами с автономными дронами. Дроны атакуют врагов и разрушают вражеские снаряды.
block.azimut-gravastar.name = Гравастар
block.azimut-gravastar.description = Выпускает залп лазеров. Требует итерин для работы.
# < Walls >
block.azimut-venerium-wall.name = Венериумная стена
block.azimut-venerium-wall.description = Защищает постройки от вражеских снарядов.
block.azimut-venerium-large-wall.name = Большая венериумная стена
block.azimut-venerium-largw-wall.description = Защищает постройки от вражеских снарядов.
block.azimut-venerium-huge-wall.name = Огромная венериумная стена
block.azimut-venerium-huge-wall.description = Защищает постройки от вражеских снарядов.
block.azimut-compound-wall.name = Стена из соединения
block.azimut-compound-wall.description = Защищает постройки от вражеских снарядов.
block.azimut-compound-large-wall.name = Большая стена из соединения 
block.azimut-compound-large-wall.description = Защищает постройки от вражеских снарядов.
block.azimut-compound-huge-wall.name = Огромная стена из соединения
block.azimut-compound-huge-wall.description = Защищает постройки от вражеских снарядов.
block.azimut-zinc-wall.name = Оцинкованная стена
block.azimut-zinc-wall.description = Защищает постройки от вражеских снарядов. Периодически выпускает электрический разряд при ударе.
block.azimut-zinc-large-wall.name = Большая оцинкованная стена
block.azimut-zinc-large-wall.description = Защищает постройки от вражеских снарядов. Периодически выпускает электрический разряд при ударе.
block.azimut-zinc-huge-wall.name = Огромная оцинкованная стена
block.azimut-zinc-huge-wall.description = Защищает постройки от вражеских снарядов. Периодически выпускает электрический разряд при ударе.
# < Storage >
block.azimut-core-forum.name = Ядро: «Форум»
block.azimut-core-forum.description = Ядро базы. Бронировано. После уничтожения весь контакт с регионом теряется.
block.azimut-core-forum.details = Первая итерация. Бронированное, самовоспроизводящееся. Оснащено логическими технологиями. Укомплектовано одноразовыми твердотопливными системами РСУ и посадочными двигателями. Прекрасно подходит для перелётов по планете.
block.azimut-illuminator.name = Осветитель
block.azimut-illuminator.description = Излучает свет.
# < Crafting >
block.azimut-decoder.name = Дешифратор
block.azimut-decoder.description = Дешифрует информацию с информационных ячеек, синтезируя особый ресурс для исследований — байты.
block.azimut-decoder.details = Дрэйдону бы это не понравилось..
block.azimut-platinum-smelter.name = Платиновая плавильня
block.azimut-platinum-smelter.description = Выплавляет платину с помощью бутана и сырой платины.
block.azimut-platinum-forge.name = Платиновая кузница
block.azimut-platinum-forge.description = Синтезирует платину с помощью сырой платины и изобутана, используя цезий для дополнительного источника тепла и точности выплавляющих лазеров.
block.azimut-isobutane-burner.name = Сжигатель изобутана
block.azimut-isobutane-burner.description = Производит энергию путём сжигания изобутана.
block.azimut-mixing-chamber-base.name = Основа смешивательной камеры
block.azimut-mixing-chamber-base.description = Синтезирует геларин из кобальта и газообразного аммиака.
block.azimut-mixing-chamber-part.name = Часть смешивательной камеры
block.azimut-mixing-chamber-part.description = Выпаривает жидкий аммиак в газообразный. Требует тепло для работы.
block.azimut-power-heater.name = Энергетический нагреватель
block.azimut-power-heater.description = Нагревает блоки напротив себя. Требует энергию для работы.
block.azimut-heat-courier.name = Тепловой перенаправитель
block.azimut-heat-courier.description = Перенаправляет накопленное тепло на другие блоки.
block.azimut-silicon-cultivator.name = Кремниевый культиватор
block.azimut-silicon-cultivator.description = Использует аммиак, энергию и плитки с кремниевой формой жизни для выращивания соединения.
block.azimut-solid-fuel-mixer.name = Смеситель твёрдого топлива
block.azimut-solid-fuel-mixer.description = Синтезирует твёрдое топливо, смешивая изобутан и итерин.
block.azimut-exothermic-chamber.name = Экзотермическая камера
block.azimut-exothermic-chamber.description = Производит энергию, сжигая твёрдое топливо.
block.azimut-sphalerite-refiner.name = Сфалеритовый рафинёр
block.azimut-sphalerite-refiner.description = Производит цинк из сфалерита. Требует тепло для работы.
block.azimut-static-refiner.name = Статический рафинёр
block.azimut-static-refiner.description = Извлекает катериум из сырого катериума. Требует аммиак в качестве стабилизатора. Выделяет азот и цезий в качестве побочных продуктов.
block.azimut-static-refiner.details = Азотная кислота в сделку не входила!
block.azimut-atmospheric-extractor-base.name = База атмосферного экстрактора
block.azimut-atmospheric-extractor-base.description = Концентрирует изобутан из атмосферы.
block.azimut-atmospheric-extractor-cooler.name = Конденсатор атмосферного экстрактора
block.azimut-atmospheric-extractor-cooler.description = Конденсирует свартзит с помощью венериума. Требует тепло для работы.
block.azimut-atmospheric-extractor-collector.name = Разделитель атмосферного экстрактора
block.azimut-atmospheric-extractor-collector.description = Извлекает примеси газов из местного воздуха и концентрирует их в аммиак.
# < Drills >
block.azimut-mechanical-quarry.name = Механический карьер
block.azimut-mechanical-quarry.description = При размещении на соответствующей руде постоянно добывает предметы в медленном темпе. Способен извлекать только базовые ресурсы.
block.azimut-cold-conversion-solar-panel.name = Панель холодной конверсии
block.azimut-cold-conversion-solar-panel.description = Синтезирует итерин, конденсируя газы из атмосферы и обрабатывая их ультрафиолетовым излучением.
block.azimut-relic-drill.name = Реликтовый бур
block.azimut-relic-drill.description = При размещении на соответствующей руде постоянно выводит предметы очередями. Требует энергию для работы.
block.azimut-terraformer.name = Терраформер
block.azimut-terraformer.description = При размещении напротив стены с рудой постоянно выводит предметы. Требует энергию для работы.
# < Power >
block.azimut-energy-converter.name = Энергоконвертер
block.azimut-energy-converter.description = Конвертирует жидкостную энергию в обычную.
block.azimut-diphasic-solar-array.name = Дифазный солнечный массив
block.azimut-diphasic-solar-array.description = Обеспечивает небольшое количество энергии от солнца. Непостоянная выработка энергии заставит вас использовать оцинкованные накопители энергии.
block.azimut-energy-bridge.name = Энергомост
block.azimut-energy-bridge.description = Передаёт питание подключённым мостам. Мост может получать энергию или передавать её любым соседним блокам.
block.azimut-zinc-polyetheric-reactor.name = Цинковый полиэтерический реактор
block.azimut-zinc-polyetheric-reactor.description = Генерирует энергию путём сжигания твёрдого топлива и его своевременного охлаждения азотом. Производит тепло.
block.azimut-galvanized-power-bank.name = Оцинкованный накопитель энергии
block.azimut-galvanized-power-bank.description = Накапливает энергию во времена её избытка. Отдаёт энергию при дефиците.
# < Conveyors >
block.azimut-cobalt-duct.name = Кобальтовый конвейер
block.azimut-cobalt-duct.description = Перемещает предметы вперёд.
block.azimut-geliarin-duct.name = Гелариновый конвейер
block.azimut-geliarin-duct.description = Перемещает предметы вперёд пачками. Принимает предметы с начального сегмента и разгружает их с последнего в три стороны.
block.azimut-geliarin-router.name = Гелариновый маршрутизатор
block.azimut-geliarin-router.description = Равномерно распределяет предметы с гелариновых конвейеров в трёх направленях.
block.azimut-cobalt-junction.name = Кобальтовый перекрёсток
block.azimut-cobalt-junction.description = Действует как мост для двух пересекающихся кобальтовых каналов.
block.azimut-cobalt-duct-bridge.name = Кобальтовый мост
block.azimut-cobalt-duct-bridge.description = Перемещает предметы над местностью и зданиями.
block.azimut-cobalt-router.name = Кобальтовый маршрутизатор
block.azimut-cobalt-router.description = Равномерно распределяет входящие предметы по трём выходящим направлениям.
block.azimut-cobalt-sorter.name = Кобальтовый сортировщик
block.azimut-cobalt-sorter.description = Если входящий предмет совпадает с выбором, то он проходит вперёд. Если нет, то предмет выводится влево и вправо.
block.azimut-cobalt-overflow-gate.name = Кобальтовый избыточный затвор
block.azimut-cobalt-overflow-gate.description = Выводит предметы по бокам только в том случае, если передний путь заблокирован.
block.azimut-inverted-cobalt-overflow-gate.name = Кобальтовый избыточный шлюз
block.azimut-inverted-cobalt-overflow-gate.description = Противоположность кобальтовому избыточному затвору. Выводит предметы вперед только в том случае, если боковые выходы заблокированы.
block.azimut-cobalt-unloader.name = Оцинкованный разгрузчик
block.azimut-cobalt-unloader.description = Выгружает выбранный предмет из блока позади него. Не может выгружать из ядер.
block.azimut-cargo-loader-load.name = Бронированная точка погрузки
block.azimut-cargo-loader-load.description = Производит бронированные грузовые дроны. Дроны автоматически распределяют предметы по точкам разгрузки в зависимости от установленного на них фильтра.
block.azimut-cargo-unloader-unload.name = Точка выгрузки
block.azimut-cargo-unloader-unload.description = Действует как точка разгрузки для грузовых дронов. Принимает предметы, соответствующие выбранному фильтру.
block.azimut-polyetheric-conveyor.name = Полиэтерический конвейер
block.azimut-polyetheric-conveyor.description = Мгновенно перемещает предметы над местностью или зданиями. Имеет абсурдно большую дистанцию перемещения предметов. Требует большое количество энергии.
# < Liquids >
block.azimut-pump.name = Кобальтовая помпа
block.azimut-pump.description = Перекачивает и выводит жидкости. Не требует энергию.
block.azimut-galvanized-pump.name = Оцинкованная помпа
block.azimut-galvanized-pump.description = Перекачивает и выводит жидкости. Долго разгоняется. Требует энергию.
block.azimut-galvanized-pipeline.name = Оцинкованный трубопровод
block.azimut-galvanized-pipeline.description = Перемещает жидкости над любой местностью или зданиями. Требует малое количество энергии.
block.azimut-directed-conduit.name = Директивный трубопровод
block.azimut-directed-conduit.description = Перемещает жидкости вперёд. Используется вместе с насосами и другими трубопроводами.
block.azimut-directed-liquid-junction.name = Директивный жидкостный перекрёсток
block.azimut-directed-liquid-junction.description = Действует как мост для двух пересекающихся трубопроводов.
block.azimut-directed-liquid-bridge.name = Директивный жидкостный мост
block.azimut-directed-liquid-bridge.description = Перемещает жидкости над любой местностью или зданиями.
block.azimut-directed-liquid-router.name = Директивный жидкостный маршрутизатор
block.azimut-directed-liquid-router.description = Равномерно распределяет жидкости во все стороны.
block.azimut-small-liquid-cylinder.name = Малый жидкостный резервуар
block.azimut-small-liquid-cylinder.description = Хранит небольшое количество жидкости.
block.azimut-large-liquid-tank.name = Большой жидкостный резервуар
block.azimut-large-liquid-tank.description = Хранит большое количество жидкости.
# < Logic >
block.azimut-alloy-memory-cell.name = Сплавленная ячейка памяти
block.azimut-alloy-memory-cell.description = Хранит информацию для оцинкованного процессора.
block.azimut-zinc-processor.name = Оцинкованный процессор
block.azimut-zinc-processor.description = Выполняет последовательность логических инструкций в цикле. Может быть использован для управления единицами и постройками.
# < Status >
status.azimut-ram.name = Таран
status.azimut-emp.name = ЭМИ
status.azimut-charge.name = Прицеливание
status.azimut-tow.name = Буксир
status.azimut-fortified.name = Укреплённый
# < Sectors >
sector.azimut-first.name = Прибытие
sector.azimut-first.description = Низкая активность противника делает этот сектор идеальным для исследования ранних технологий.\n\nАвтоматизируйте производство и продвигайтесь вперёд.
sector.azimut-twos.name = Кремниевая расщелина
sector.azimut-twos.description = Среди гористой местности тянется расщелина, заполненная неизвестной формой жизни. Вражеская база блокирует дальнейшее продвижение.\n\nИспользуйте аммиак, сконденсированный на поверхности льда. Создание нового ресурса поможет уничтожить вражескую базу.
sector.azimut-threes.name = Холодная гавань
sector.azimut-threes.description = Затопленная гавань значительно ограничивает выбор боевых единиц. Чтобы уничтожить два вражеских ядра, вам придётся полагаться на корабли.\n\nИспользуйте дальнобойные возможности флота, чтобы получить преимущество при осаде вражеской базы.
sector.azimut-four.name = Глушь
sector.azimut-four.description = Руины этого сектора содержат технологии, которые поддержат ваше дальнейшее расширение.\n\nОжидайте серьёзного сопротивления противника, стремящегося защитить эту информацию.
sector.azimut-sixth.name = Затопленные каналы
sector.azimut-sixth.description = На месте древних ледников теперь простирается обширная сеть затопленных каналов.\n\nИз-за сложного рельефа вам придётся полагаться на ховеры — манёвренные боевые единицы, способные преодолевать большинство препятствий.
sector.azimut-fifth.name = Тесные пещеры
sector.azimut-fifth.description = Среди обширных горных хребтов часто встречаются расщелины, освещённые солнцем.\n\nИспользуйте технологическое превосходство, чтобы уничтожить вражескую базу и продвинуться вперёд.
sector.azimut-seven.name = Замёрзшая граница
sector.azimut-seven.description = Цепь архипелагов тянется вдоль затопленных каналов.\n\nВражеский укреплённый узел контролирует воздушное пространство, перекрывая путь на север. Для успешного штурма потребуется задействовать два разных типа боевых единиц. Будьте начеку — противник окажет серьёзное сопротивление.
sector.azimut-seven.details = Искатели пекла всегда славились своим технологическим прогрессом. Заключив договор о исследованиях с агрессорами, их ПВО усовершенствовалось настолько, что теперь проход на север перекрыт огромной зоной обстрела. Помимо этого, часть экватора и южные зоны также находятся под жёстким контролем воздушного пространства.
sector.azimut-eight.name = Северный рубеж 
sector.azimut-eight.description = Отправляйтесь в самые холодные, покрытые снегом регионы планеты, чтобы добыть новый тип ресурса.\n\nСуровый климат и ограниченная местность приведут к нехватке ресурсов — используйте имеющееся с умом.
sector.azimut-nine.name = Холодная точка
sector.azimut-nine.description = В холодной дымке скрывается вражеская база.\n\nИзучите новый материал, похожий на золото, и создайте «Арбитра» — тяжёлую наземную боевую единицу, чтобы захватить базу противника.
sector.azimut-nine.details = Добыча двух материалов со схожими электрохимическими свойствами может показаться не самым рациональным решением. Однако здесь это необходимый шаг для дальнейшего продвижения.
sector.azimut-ten.name = Эстуарий
sector.azimut-ten.description = Дальше, на экваторе, находится недавно сформировавшийся эстуарий.\n\nНа секторе не была замечена вражеская активность. Сделайте сектор сырьевым придатком и продвигайтесь дальше.
sector.azimut-elev.name = Чаща
sector.azimut-elev.description = В умеренном климате растительность становится всё более распространённой. Название этого места не случайно — оно связано с бурным и обильным развитием флоры.\n\nНачните вкладываться в дешифратор. Постройте оборону. Используйте уникальный ресурс для исследований.
sector.azimut-elev.details = В отличие от спор, кремниевые формы жизни отличаются низкой агрессивностью и высокой промышленной ценностью. Сразу выделяются два наиболее развитых типа организмов. Здесь они сосуществуют в гармонии, даже не пытаясь бороться за выживание или доминирование — крайне необычное и интересное поведение.
sector.azimut-twelw.name = Арочные озёра 
sector.azimut-twelw.description = Чаща граничит с парой стоячих озёр, что периодически пополняются местными дождями. Арки, что косвенно разделяют озёра, по всей видимости, имеют кобальтовые стержни, на которых они и стоят.\n\nРазбитие вражеской базы окончательно закрепит нас в этом регионе. Используйте "Паромщиков" - дальнобойные морские единицы, что окажут сильное давление на логистику вражеской базы.